<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['DM Sans', 'sans-serif'],
                    },
                    colors: {
                        ink: '#1a1a2e',
                        slate: '#16213e',
                        mist: '#e8eaf0',
                        accent: '#4f8ef7',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'DM Sans', sans-serif; }

        #msglist li {
            animation: fadeSlideIn 0.25s ease forwards;
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Custom scrollbar */
        #msglist::-webkit-scrollbar { width: 4px; }
        #msglist::-webkit-scrollbar-track { background: transparent; }
        #msglist::-webkit-scrollbar-thumb { background: #4f8ef744; border-radius: 99px; }
    </style>
</head>
<body class="bg-ink min-h-screen flex items-center justify-center p-4">

    <!-- Card -->
    <div class="w-full max-w-lg bg-slate rounded-2xl shadow-2xl overflow-hidden flex flex-col" style="height: 90vh; max-height: 680px;">

        <!-- Header -->
        <div class="px-6 py-5 border-b border-white/5 flex items-center gap-3">
            <div class="w-2.5 h-2.5 rounded-full bg-accent animate-pulse"></div>
            <h1 class="text-mist font-semibold tracking-tight text-lg">Chat Room</h1>
        </div>

        <!-- Room + User inputs -->
        <div class="px-6 py-4 flex flex-col sm:flex-row gap-3 border-b border-white/5">
            <div class="flex-1 relative">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-white/25 text-xs font-medium uppercase tracking-widest">Room</span>
                <input
                    type="text"
                    id="roomId"
                    placeholder="room-001"
                    class="w-full bg-ink/60 text-mist text-sm rounded-xl pl-16 pr-4 py-3 outline-none border border-white/8 focus:border-accent/60 transition-colors placeholder:text-white/20"
                />
            </div>
            <div class="flex-1 relative">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-white/25 text-xs font-medium uppercase tracking-widest">You</span>
                <input
                    type="text"
                    id="username"
                    placeholder="username"
                    class="w-full bg-ink/60 text-mist text-sm rounded-xl pl-14 pr-4 py-3 outline-none border border-white/8 focus:border-accent/60 transition-colors placeholder:text-white/20"
                />
            </div>
        </div>

        <!-- Message list -->
        <ul
            id="msglist"
            class="flex-1 overflow-y-auto px-6 py-4 flex flex-col gap-3 scroll-smooth"
        >
            <!-- Messages appear here -->
            <li class="text-white/20 text-sm text-center mt-auto">No messages yet. Say hello 👋</li>
        </ul>

        <!-- Message input -->
        <div class="px-6 py-4 border-t border-white/5 flex items-center gap-3">
            <input
                type="text"
                id="newmsg"
                placeholder="Type a message..."
                class="flex-1 bg-ink/60 text-mist text-sm rounded-xl px-4 py-3 outline-none border border-white/8 focus:border-accent/60 transition-colors placeholder:text-white/20"
            />
            <button
                id="btn"
                class="bg-accent hover:bg-accent/80 active:scale-95 transition-all text-white text-sm font-semibold rounded-xl px-5 py-3 shrink-0"
            >
                Send
            </button>
        </div>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
